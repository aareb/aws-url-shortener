name: Deploy URL Shortener

on:
  push:
    branches: [ "master", "main" ]
  pull_request:
    branches: [ "master", "main" ]

env:
  AWS_REGION: eu-west-2
  TERRAFORM_VERSION: "1.5.0"

jobs:
  lint-and-validate:
    name: Lint and Validate
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: "20"

    - name: Install Lambda dependencies
      run: |
        cd lamda
        npm install
        npm audit --audit-level=moderate

    - name: Setup Terraform
      uses: hashicorp/setup-terraform@v2
      with:
        terraform_version: ${{ env.TERRAFORM_VERSION }}

    - name: Terraform Format Check
      working-directory: terraform
      run: terraform fmt -check -recursive

    - name: Terraform Validate
      working-directory: terraform
      run: terraform validate

  build:
    name: Build Lambda Package
    runs-on: ubuntu-latest
    needs: lint-and-validate

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: "20"

    - name: Build Lambda Package
      run: |
        cd lamda
        npm install --production
        cd ..
        zip -r terraform/lambda.zip lamda/

    - name: Upload Lambda artifact
      uses: actions/upload-artifact@v3
      with:
        name: lambda-package
        path: terraform/lambda.zip
        retention-days: 1

  plan:
    name: Terraform Plan
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: dev

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Download Lambda artifact
      uses: actions/download-artifact@v3
      with:
        name: lambda-package
        path: terraform/

    - name: Configure AWS credentials
      uses: aws-actions/configure-aws-credentials@v4
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: ${{ env.AWS_REGION }}

    - name: Setup Terraform
      uses: hashicorp/setup-terraform@v2
      with:
        terraform_version: ${{ env.TERRAFORM_VERSION }}

    - name: Terraform Init
      working-directory: terraform
      run: terraform init

    - name: Terraform Plan (Dev)
      working-directory: terraform
      run: terraform plan -var-file=env/dev.tfvars -out=tfplan.dev

    - name: Upload plan artifact
      uses: actions/upload-artifact@v3
      with:
        name: tf-plan
        path: terraform/tfplan.dev
        retention-days: 1

  deploy:
    name: Deploy to ${{ matrix.environment }}
    runs-on: ubuntu-latest
    needs: plan
    strategy:
      matrix:
        environment: [dev]
    environment:
      name: ${{ matrix.environment }}
    if: github.event_name == 'push'

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Download Lambda artifact
      uses: actions/download-artifact@v3
      with:
        name: lambda-package
        path: terraform/

    - name: Download Terraform plan
      uses: actions/download-artifact@v3
      with:
        name: tf-plan
        path: terraform/

    - name: Configure AWS credentials
      uses: aws-actions/configure-aws-credentials@v4
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: ${{ env.AWS_REGION }}

    - name: Setup Terraform
      uses: hashicorp/setup-terraform@v2
      with:
        terraform_version: ${{ env.TERRAFORM_VERSION }}

    - name: Terraform Init
      working-directory: terraform
      run: terraform init

    - name: Terraform Apply
      working-directory: terraform
      run: terraform apply -auto-approve tfplan.dev

